name: Deploy to Hetzner

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Deploy target (manual runs only)"
        type: choice
        options:
          - dev
          - prod
          - both
        default: dev

env:
  NODE_VERSION: "20"

permissions:
  contents: read
  packages: read

jobs:
  resolve-targets:
    name: Resolve deploy targets
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.set.outputs.environments }}
    steps:
      - id: set
        run: |
          # Pushes (any branch) deploy dev only. Production is manual-trigger only.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="${{ inputs.target_environment }}"
          else
            TARGET="dev"
          fi
          case "$TARGET" in
            both) ENV_JSON='["dev","prod"]' ;;
            prod) ENV_JSON='["prod"]' ;;
            *) ENV_JSON='["dev"]' ;;
          esac
          echo "environments=$ENV_JSON" >> "$GITHUB_OUTPUT"
          echo "Deploy targets: $ENV_JSON (event=${{ github.event_name }}, ref=${{ github.ref_name }})"

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    environment: ${{ (github.event_name == 'workflow_dispatch' && (inputs.target_environment == 'prod' || inputs.target_environment == 'both')) && 'prod' || 'dev' }}
    env:
      NUGET_TOKEN: ${{ secrets.NUGET_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          registry-url: 'https://npm.pkg.github.com'
          scope: '@imriva'

      - name: Configure npm auth for GitHub Packages
        if: env.NUGET_TOKEN != ''
        run: echo "NODE_AUTH_TOKEN=$NUGET_TOKEN" >> "$GITHUB_ENV"

      - name: Validate GitHub Packages auth
        run: |
          set -euo pipefail
          npm view @imriva/framework@0.1.4 version --registry=https://npm.pkg.github.com

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          VITE_OIDC_ISSUER: ${{ vars.VITE_OIDC_ISSUER }}
          VITE_OIDC_CLIENT_ID: ${{ vars.VITE_OIDC_CLIENT_ID }}
          VITE_OIDC_REDIRECT_URI: ${{ vars.VITE_OIDC_REDIRECT_URI }}
          VITE_OIDC_SCOPE: ${{ vars.VITE_OIDC_SCOPE }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_APPINSIGHTS_CONNECTION_STRING: ${{ vars.VITE_APPINSIGHTS_CONNECTION_STRING }}
          VITE_APPINSIGHTS_CLOUD_ROLE: ${{ vars.VITE_APPINSIGHTS_CLOUD_ROLE }}

  deploy-frontend:
    name: Deploy Frontend (${{ matrix.github_environment }})
    runs-on: ubuntu-latest
    needs: [build-and-test, resolve-targets]
    strategy:
      fail-fast: false
      matrix:
        github_environment: ${{ fromJSON(needs.resolve-targets.outputs.environments) }}
    environment: ${{ matrix.github_environment }}
    if: needs.build-and-test.result == 'success' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log deployment target
        run: echo "Deploying frontend to GitHub environment '${{ matrix.github_environment }}' from branch ${{ github.ref_name }}"

      # GitHub Environment: 5 VITE variables (vars.*) + Hetzner vars + NUGET_TOKEN + HETZNER_SSH_KEY secrets.
      - name: Deploy to Hetzner Frontend
        uses: appleboy/ssh-action@v1.0.0
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          GH_ENVIRONMENT: ${{ matrix.github_environment }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          NUGET_TOKEN: ${{ secrets.NUGET_TOKEN }}
          VITE_OIDC_ISSUER: ${{ vars.VITE_OIDC_ISSUER }}
          VITE_OIDC_CLIENT_ID: ${{ vars.VITE_OIDC_CLIENT_ID }}
          VITE_OIDC_REDIRECT_URI: ${{ vars.VITE_OIDC_REDIRECT_URI }}
          VITE_OIDC_SCOPE: ${{ vars.VITE_OIDC_SCOPE }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_APPINSIGHTS_CONNECTION_STRING: ${{ vars.VITE_APPINSIGHTS_CONNECTION_STRING }}
          VITE_APPINSIGHTS_CLOUD_ROLE: ${{ vars.VITE_APPINSIGHTS_CLOUD_ROLE }}
        with:
          host: ${{ vars.HETZNER_HOST }}
          username: ${{ vars.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: ${{ vars.HETZNER_PORT }}
          envs: DEPLOY_PATH,GH_ENVIRONMENT,GITHUB_REPOSITORY,GITHUB_REF_NAME,NUGET_TOKEN,VITE_OIDC_ISSUER,VITE_OIDC_CLIENT_ID,VITE_OIDC_REDIRECT_URI,VITE_OIDC_SCOPE,VITE_API_BASE_URL,VITE_APPINSIGHTS_CONNECTION_STRING,VITE_APPINSIGHTS_CLOUD_ROLE
          script: |
            echo "Starting frontend deployment (GitHub environment: ${GH_ENVIRONMENT:-unknown})..."
            
            if [ "$GH_ENVIRONMENT" = "prod" ]; then
              PREFERRED_DEPLOY_DIR="${DEPLOY_PATH:-/opt/vdpconnect-prod/frontend}"
            else
              PREFERRED_DEPLOY_DIR="${DEPLOY_PATH:-/opt/vdpconnect/frontend}"
            fi
            DEPLOY_DIR="$PREFERRED_DEPLOY_DIR"

            # prod: strict (no home fallback to avoid wrong-location deploys); dev: fall back to ~ when /opt is not writable
            if [ -d "$PREFERRED_DEPLOY_DIR" ] && [ -w "$PREFERRED_DEPLOY_DIR" ]; then
              echo "Using existing deployment directory: $DEPLOY_DIR"
            elif [ "$GH_ENVIRONMENT" = "prod" ]; then
              echo "ERROR: prod deploy directory $PREFERRED_DEPLOY_DIR is missing or not writable"
              exit 1
            elif mkdir -p "$PREFERRED_DEPLOY_DIR" 2>/dev/null; then
              echo "Created deployment directory: $DEPLOY_DIR"
            else
              DEPLOY_DIR="$HOME/vdpconnect/frontend"
              mkdir -p "$DEPLOY_DIR"
              echo "Cannot access $PREFERRED_DEPLOY_DIR, using user home directory: $DEPLOY_DIR"
            fi

            if ! cd "$DEPLOY_DIR"; then
              echo "ERROR: cannot cd $DEPLOY_DIR"
              exit 1
            fi
            echo "Using deployment directory: $(pwd)"
            
            mkdir -p ~/.ssh
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null || true
            export GIT_TERMINAL_PROMPT=0
            
            NUGET_TOKEN_TRIM=$(echo "$NUGET_TOKEN" | tr -d '\n\r' | xargs)
            if [ -z "$NUGET_TOKEN_TRIM" ]; then
              echo "ERROR: NUGET_TOKEN not set in GitHub environment."
              echo "Add NUGET_TOKEN with 'repo' and 'read:packages' scopes."
              exit 1
            fi
            
            # Configure Git (NUGET_TOKEN for HTTPS, then SSH, then public HTTPS)
            if [ ! -d .git ]; then
              echo "Directory is not a git repository. Cloning repository..."
              if [ "$(ls -A)" ]; then
                rm -rf * .[^.]* 2>/dev/null || true
              fi
              if [ -n "$NUGET_TOKEN_TRIM" ] && [ ${#NUGET_TOKEN_TRIM} -gt 10 ]; then
                echo "Cloning using HTTPS with NUGET_TOKEN..."
                if ! git clone "https://${NUGET_TOKEN_TRIM}@github.com/${GITHUB_REPOSITORY}.git" .; then
                  echo "ERROR: Failed to clone repository using NUGET_TOKEN"
                  echo "Check that NUGET_TOKEN is valid and has 'repo' scope"
                  exit 1
                fi
                git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
              elif git clone "git@github.com:${GITHUB_REPOSITORY}.git" . 2>/dev/null; then
                echo "Cloned using SSH"
              elif git clone "https://github.com/${GITHUB_REPOSITORY}.git" .; then
                echo "Cloned using HTTPS (public repository)"
              else
                echo "ERROR: Failed to clone repository ${GITHUB_REPOSITORY}"
                exit 1
              fi
              if ! git checkout "${GITHUB_REF_NAME}" && ! git checkout -b "${GITHUB_REF_NAME}" "origin/${GITHUB_REF_NAME}"; then
                echo "ERROR: Failed to checkout branch ${GITHUB_REF_NAME}"
                exit 1
              fi
            else
              echo "Pulling latest code from branch: ${GITHUB_REF_NAME}"
              if [ -n "$NUGET_TOKEN_TRIM" ] && [ ${#NUGET_TOKEN_TRIM} -gt 10 ]; then
                git remote set-url origin "https://${NUGET_TOKEN_TRIM}@github.com/${GITHUB_REPOSITORY}.git"
              fi
              git fetch origin "${GITHUB_REF_NAME}"
              if ! git checkout "${GITHUB_REF_NAME}" && ! git checkout -b "${GITHUB_REF_NAME}" "origin/${GITHUB_REF_NAME}"; then
                echo "ERROR: Failed to checkout branch ${GITHUB_REF_NAME}"
                exit 1
              fi
              if ! git pull origin "${GITHUB_REF_NAME}"; then
                echo "ERROR: Failed to pull branch ${GITHUB_REF_NAME}"
                exit 1
              fi
              if [ -n "$NUGET_TOKEN_TRIM" ] && [ ${#NUGET_TOKEN_TRIM} -gt 10 ]; then
                git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
              fi
            fi
            
            echo "Setting environment variables from GitHub variables and secrets..."
            export BUILD_MODE="${BUILD_MODE:-production}"
            export NPM_TOKEN="${NUGET_TOKEN_TRIM}"
            export VITE_OIDC_ISSUER="${VITE_OIDC_ISSUER:-https://dev.auth.vdpconnect.idxd.de}"
            export VITE_OIDC_CLIENT_ID="${VITE_OIDC_CLIENT_ID:-imriva-frontend}"
            export VITE_OIDC_REDIRECT_URI="${VITE_OIDC_REDIRECT_URI:-https://dev.app.vdpconnect.idxd.de/callback}"
            export VITE_OIDC_SCOPE="${VITE_OIDC_SCOPE:-openid profile api}"
            export VITE_API_BASE_URL="${VITE_API_BASE_URL:-https://dev.api.vdpconnect.idxd.de}"
            export VITE_APPINSIGHTS_CONNECTION_STRING="${VITE_APPINSIGHTS_CONNECTION_STRING:-}"
            if [ -z "${VITE_APPINSIGHTS_CONNECTION_STRING}" ]; then
              echo "WARN: VITE_APPINSIGHTS_CONNECTION_STRING not set in GitHub Environment '${GH_ENVIRONMENT}'; Application Insights telemetry will be disabled."
            fi
            if [ "$GH_ENVIRONMENT" = "prod" ]; then
              export VITE_APPINSIGHTS_CLOUD_ROLE="${VITE_APPINSIGHTS_CLOUD_ROLE:-vdpconnect-frontend-prod}"
            else
              export VITE_APPINSIGHTS_CLOUD_ROLE="${VITE_APPINSIGHTS_CLOUD_ROLE:-vdpconnect-frontend-dev}"
            fi
            
            if command -v docker-compose &> /dev/null; then
              DOCKER_COMPOSE="docker-compose"
            elif docker compose version &> /dev/null; then
              DOCKER_COMPOSE="docker compose"
            else
              echo "ERROR: Docker Compose not found!"
              exit 1
            fi
            
            if ! docker ps &> /dev/null; then
              echo "ERROR: Permission denied accessing Docker daemon"
              exit 1
            fi
            
            echo "Using Docker Compose command: $DOCKER_COMPOSE"
            echo "Building and starting containers..."
            $DOCKER_COMPOSE up -d --build
            if [ $? -ne 0 ]; then
              echo "ERROR: Failed to start containers"
              docker ps -a || true
              exit 1
            fi
            echo "Deployment complete!"
            $DOCKER_COMPOSE ps
            $DOCKER_COMPOSE logs --tail=20
            sleep 5
            curl -f http://localhost:8080/health || echo "Health check not ready yet"
